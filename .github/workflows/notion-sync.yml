name: Notion Sync

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours UTC
  workflow_dispatch:          # manual trigger from Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # required to push commits

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Sync posts from Notion
        run: node scripts/notion-sync.js
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

      - name: Commit and push if posts changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/ resources/images/blog/
          git diff --staged --quiet || git commit -m "chore: sync posts from Notion [skip ci]"
          git push
