name: Static asset check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check-public-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Check public asset references
        run: npm run check:assets
